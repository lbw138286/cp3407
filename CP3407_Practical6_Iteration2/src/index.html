<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-container">
    <header>
      <h1>Smart Expense Tracker</h1>
      <p>Iteration 1 implementation: Add, edit, and delete expense records.</p>
    </header>

    <section class="card">
      <h2 id="form-title">Add New Expense</h2>
      <form id="expense-form">
        <input type="hidden" id="edit-id" />

        <div class="form-grid">
          <label>
            Expense Title
            <input type="text" id="title" placeholder="e.g. Lunch" required />
          </label>

          <label>
            Amount ($)
            <input type="number" id="amount" min="0.01" step="0.01" placeholder="e.g. 12.50" required />
          </label>

          <label>
            Category
            <select id="category" required>
              <option value="">Select category</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Shopping">Shopping</option>
              <option value="Bills">Bills</option>
              <option value="Education">Education</option>
              <option value="Business">Business</option>
              <option value="Other">Other</option>
            </select>
          </label>

          <label>
            Date
            <input type="date" id="date" required />
          </label>
        </div>

        <div class="button-row">
          <button type="submit" id="submit-button">Add Expense</button>
          <button type="button" id="cancel-edit-button" class="secondary hidden">Cancel Edit</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>Expense Records</h2>
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="expense-table-body"></tbody>
      </table>
      <p id="empty-message" class="empty-message">No expenses recorded yet.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
